<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cafe 17 | Gourmet & Patisserie Menu" />
  <title>Cafe 17 | Gourmet & Patisserie</title>
  <link rel="icon" type="image/png" href="favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold:#b8860b; --bg:#f8f8f8; --card:#ffffff; --text:#1a1a1a; --muted:#666;
      --panel:#f0f0f0; --stroke:#e0e0e0; --stroke2:#d8d8d8;
      --radius:16px;
    }
    *{ margin:0; padding:0; box-sizing:border-box; font-family:"Inter",sans-serif; }
    body{ background:var(--bg); color:var(--text); scroll-behavior:smooth; overflow-x:hidden; }

    header{
      padding: 14px 5%;
      display:flex; justify-content:space-between; align-items:center; gap:16px;
      background: rgba(255,255,255,0.95);
      position: sticky; top: 0; z-index: 2000;
      border-bottom: 1px solid rgba(184,134,11,0.2);
      backdrop-filter: blur(15px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .logo{
      font-family:"Playfair Display",serif; color:var(--gold);
      font-size:28px; text-decoration:none; font-weight:900;
      letter-spacing:0.5px; white-space:nowrap;
    }

    .nav-controls{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    nav{ display:flex; gap:14px; align-items:center; }
    nav a{
      color:#666; text-decoration:none; font-size:11px; text-transform:uppercase;
      letter-spacing:1px; font-weight:800; transition:all 0.3s ease;
      position:relative;
      padding-bottom:4px;
    }
    nav a::after{
      content:''; position:absolute; bottom:0; left:0;
      width:0; height:2px; background:var(--gold);
      transition:width 0.3s ease;
    }
    nav a:hover{ 
      color:var(--gold);
      transform:translateY(-2px);
    }
    nav a:hover::after{
      width:100%;
    }

    .btn-outline, .btn-solid, .menu-btn{
      border-radius:10px; cursor:pointer; font-weight:900;
      font-size:12px; letter-spacing:0.4px;
      padding:8px 12px;
      transition:all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
      white-space:nowrap;
      position:relative;
      overflow:hidden;
    }
    .btn-outline, .menu-btn{
      background:transparent; border:2px solid var(--gold); color:#b8860b;
    }
    .btn-outline:hover, .menu-btn:hover{ 
      background:var(--gold); 
      color:#000;
      transform:scale(1.05);
      box-shadow:0 5px 20px rgba(184,134,11,0.3);
    }
    .btn-solid{
      background:var(--gold); border:2px solid var(--gold); color:#000;
    }
    .btn-solid:hover{ 
      filter:brightness(0.95);
      transform:scale(1.05);
      box-shadow:0 5px 20px rgba(184,134,11,0.3);
    }

    .menu-btn{ display:none; padding:8px 12px; }

    .hero{
      height:32vh; display:flex; align-items:center; justify-content:center; text-align:center;
      background:
        linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.85)),
        url("https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=1200&q=75");
      background-size:cover; background-position:center;
      position:relative;
      overflow:hidden;
    }
    .hero::before{
      content:''; position:absolute; inset:0;
      background:radial-gradient(circle at 30% 30%, rgba(184,134,11,0.05), transparent);
      pointer-events:none;
    }
    .hero h1{ 
      font-family:"Playfair Display",serif; 
      font-size:clamp(25px,5vw,48px); 
      color:var(--gold);
      position:relative;
      z-index:1;
      animation:fadeInDown 0.8s ease;
    }
    @keyframes fadeInDown{
      from{
        opacity:0;
        transform:translateY(-30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
    .hero h1 span{ 
      color:var(--gold);
      text-shadow:0 0 20px rgba(184,134,11,0.5);
    }

    .container{ padding:28px 5% 40px; max-width:1400px; margin:0 auto; }

    /* Top tools (search/filter/currency) */
    .tools{
      display:grid;
      grid-template-columns: 1.3fr 0.9fr 0.8fr;
      gap:12px;
      margin: 10px 0 18px;
      align-items:stretch;
    }
    .tool-card{
      background: rgba(184,134,11,0.25); /* stronger gold tint */
      border: 1px solid #ccc;
      border-radius: var(--radius);
      padding: 12px;
      display:flex; gap:10px; align-items:center;
      min-height:54px;
    }
    .tool-card label{
      font-size:11px; color:#777; font-weight:800; letter-spacing:0.6px; text-transform:uppercase;
      display:block; margin-bottom:6px;
    }
    .tool-input{
      width:100%;
      background:#ffffff;
      border:1px solid #d0d0d0;
      color:#1a1a1a;
      border-radius:12px;
      padding:12px 12px;
      outline:none;
      font-weight:700;
    }
    .tool-select{
      width:100%;
      background:#ffffff;
      border:1px solid #d0d0d0;
      color:#1a1a1a;
      border-radius:12px;
      padding:12px 12px;
      outline:none;
      font-weight:800;
      cursor:pointer;
    }
    .mini{
      font-size:11px; color:#888; line-height:1.25;
      background:rgba(0,0,0,0.05);
      padding:4px 8px;
      border-radius:4px;
    }

    .section-title{
      position:sticky; top:0; z-index:500;
      margin:56px 0 26px;
      border-left:5px solid var(--gold);
      padding:12px 18px;
      font-family:"Playfair Display",serif;
      font-size:32px;
      color:var(--gold);
      background:rgba(255,255,255,0.75); /* light gray translucent */
      backdrop-filter:blur(10px);
      animation:fadeInLeft 0.6s ease;
      /* ensure anchor target isn't hidden behind sticky header */
      scroll-margin-top:80px;
    }
    @keyframes fadeInLeft{
      from{
        opacity:0;
        transform:translateX(-20px);
      }
      to{
        opacity:1;
        transform:translateX(0);
      }
    }
    .grid{ 
      display:grid; 
      grid-template-columns:repeat(auto-fill, minmax(190px, 1fr)); 
      gap:14px;
      animation:fadeIn 0.5s ease;
    }
    @keyframes fadeIn{
      from{ opacity:0; }
      to{ opacity:1; }
    }

    .card{
      background:var(--card); border-radius:12px; overflow:hidden;
      border:1px solid #222; display:flex; flex-direction:column;
      transition:0.3s cubic-bezier(0.23, 1, 0.320, 1);
      position:relative; /* (EKLENDİ) skeleton için */
      cursor:pointer; /* kullanıcı karta tıklayabileceğini anlasın */
    }
    .card-badge-area{
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.95);
      padding: 4px 10px;
      border-radius: 999px;
      backdrop-filter: blur(5px);
    }
    .card:hover{
      transform:translateY(-12px);
      border-color:var(--gold);
      box-shadow:0 20px 50px rgba(184,134,11,0.15), 0 10px 30px rgba(0,0,0,0.05);
      background:linear-gradient(135deg, #ffffff 0%, #fafafa 100%);
    }
    .card-img{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }

    .card-content{ padding:12px; flex-grow:1; display:flex; flex-direction:column; }
    .card-content h3{
      font-family:"Playfair Display",serif; font-size:16px;
      margin-bottom:4px; color:var(--gold);
    }
    .card-content p{
      font-size:11px; color:var(--muted);
      margin-bottom:8px; min-height:28px; line-height:1.3;
    }
    .card-footer{
      display:flex; justify-content:space-between; align-items:center;
      margin-top:auto; padding-top:14px; border-top:1px solid #e0e0e0;
      gap:12px;
    }
    .price{ 
      font-weight:900; font-size:18px;
      background:linear-gradient(135deg, var(--gold), #e8c547);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .btn-add{
      border:1px solid var(--gold); color:var(--gold);
      padding:8px 15px; border-radius:10px;
      cursor:pointer; background:transparent;
      font-size:10px; font-weight:900; text-transform:uppercase;
      letter-spacing:0.6px; transition:all 0.3s ease;
      white-space:nowrap;
      position:relative;
      overflow:hidden;
    }
    .btn-add::before{
      content:''; position:absolute; top:0; left:-100%;
      width:100%; height:100%; background:var(--gold);
      transition:0.3s ease; z-index:-1;
    }
    .btn-add:hover{
      color:#000;
      transform:scale(1.05);
      box-shadow:0 5px 20px rgba(184,134,11,0.3);
    }
    .btn-add:hover::before{
      left:0;
    }

    .feedback-section{ background:#ffffff; padding:60px 5%; border-top:1px solid #e0e0e0; margin-top:48px; }
    .feedback-container{ max-width:650px; margin:0 auto; background:#f8f8f8; padding:40px; border-radius:15px; border:1px solid #d0d0d0; }
    .feedback-container h2{ font-family:"Playfair Display",serif; text-align:center; color:#1a1a1a; }
    .f-form{ display:grid; gap:15px; margin-top:25px; }
    .f-form input, .f-form textarea{
      width:100%; padding:12px; background:#ffffff;
      border:1px solid #d0d0d0; color:#1a1a1a; border-radius:12px; outline:none;
    }
    .submit-btn{
      background:var(--gold); color:#000; border:none;
      padding:15px; border-radius:12px;
      font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:0.6px;
    }

    .cart-float{
      position:fixed; bottom:22px; right:22px;
      background:linear-gradient(135deg, var(--gold), #e8c547);
      color:#777;
      padding:14px 16px; border-radius:999px;
      font-weight:900; z-index:3000; cursor:pointer;
      box-shadow:0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(184,134,11,0.3);
      display:flex; gap:10px; align-items:center;
      user-select:none;
      transition:all 0.3s ease;
      animation:pulse 2s infinite;
    }
    .cart-float:hover{
      transform:translateY(-5px);
      box-shadow:0 15px 40px rgba(0,0,0,0.6), 0 0 30px rgba(184,134,11,0.5);
    }
    @keyframes pulse{
      0%, 100%{
        box-shadow:0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(184,134,11,0.3);
      }
      50%{
        box-shadow:0 10px 30px rgba(0,0,0,0.5), 0 0 30px rgba(184,134,11,0.6);
      }
    }
    .badge{
      background: transparent; border: 1px solid #ddd;
      color: #333;
      padding:4px 10px; border-radius:999px;
      font-size:12px; font-weight:900;
      transition: all 0.3s ease;
    }
    .badge:hover{
      border-color: #999;
    }

    footer{ padding:40px; text-align:center; color:#999; font-size:12px; }

    /* Drawer (mobile nav) */
    .drawer-backdrop{
      position:fixed; inset:0; background:rgba(0,0,0,0.15);
      display:none; z-index:2500;
      opacity:0;
      transition:opacity 0.3s ease;
    }
    .drawer-backdrop.open{
      display:block;
      opacity:1;
    }
    .drawer{
      position:fixed; top:0; right:-380px; height:100%; width:min(380px, 86vw);
      background:var(--panel); border-left:1px solid rgba(184,134,11,0.25);
      z-index:2600; padding:18px;
      transition:right 0.35s cubic-bezier(0.23, 1, 0.320, 1);
      display:flex; flex-direction:column; gap:12px;
    }
    .drawer.open{ right:0; }
    .drawer .drawer-top{
      display:flex; justify-content:space-between; align-items:center;
      padding-bottom:10px; border-bottom:1px solid #e0e0e0;
    }
    .drawer-title{
      font-family:"Playfair Display",serif; color:var(--gold);
      font-size:20px; font-weight:900;
    }
    .drawer nav{ display:flex; flex-direction:column; gap:10px; padding-top:10px; }
    .drawer nav a{ font-size:12px; }

    /* Cart modal */
    .modal-backdrop{
      position:fixed; inset:0; background:rgba(0,0,0,0.15);
      display:none; z-index:4000;
    }
    .modal{
      position:fixed; left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:min(820px, 94vw);
      background:var(--panel);
      border:1px solid rgba(184,134,11,0.25);
      border-radius:18px;
      z-index:4100;
      display:none;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(184,134,11,0.1);
      animation:slideUp 0.3s ease;
    }
    @keyframes slideUp{
      from{
        opacity:0;
        transform:translate(-50%, -45%);
      }
      to{
        opacity:1;
        transform:translate(-50%, -50%);
      }
    }
    .modal.open, .modal-backdrop.open{ display:block; }
    .modal-header{
      padding:16px 18px; display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid #e0e0e0;
      gap:10px;
    }
    .modal-header h3{
      font-family:"Playfair Display",serif;
      color:#1a1a1a; font-size:20px;
    }
    .xbtn{
      background:transparent; border:1px solid var(--gold); color:var(--gold);
      padding:8px 12px; border-radius:10px; cursor:pointer; font-weight:900;
      white-space:nowrap;
    }
    .modal-body{ padding:16px 18px; }
    .cart-list{ display:grid; gap:10px; }
    .cart-item{
      display:grid; grid-template-columns:64px 1fr auto;
      gap:12px; align-items:center;
      padding:10px; border:1px solid #d8d8d8; border-radius:14px;
      background:#f5f5f5;
      transition:all 0.3s ease;
    }
    .cart-item:hover{
      background:#f5f5f5;
      border-color:var(--gold);
      box-shadow:0 5px 20px rgba(184,134,11,0.1);
      transform:translateX(5px);
    }
    .cart-item img{ width:64px; height:64px; border-radius:12px; object-fit:cover; }
    .ci-title{ font-weight:900; color:#1a1a1a; font-size:14px; }
    .ci-desc{ color:#999; font-size:12px; margin-top:2px; line-height:1.35; }
    .ci-right{ display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
    .qty{
      display:flex; align-items:center; gap:8px;
      border:1px solid #d8d8d8; border-radius:999px; padding:6px 10px;
    }
    .qty button{
      background:transparent; border:1px solid var(--gold); color:var(--gold);
      width:30px; height:30px; border-radius:999px; cursor:pointer; font-weight:900;
    }
    .qty span{ min-width:18px; text-align:center; font-weight:900; color:#666; }
    .remove-btn{
      border:1px solid #999; color:#666; background:transparent;
      padding:7px 10px; border-radius:12px; cursor:pointer; font-weight:800; font-size:12px;
    }
    .remove-btn:hover{ border-color:#ccc; }
    .modal-footer{
      padding:14px 18px; border-top:1px solid #e0e0e0;
      display:flex; justify-content:space-between; align-items:center; gap:12px;
      flex-wrap:wrap;
    }
    .total-line{ font-weight:900; font-size:16px; }
    .actions{ display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .empty{
      color:#999; text-align:center; padding:30px 10px;
      border:1px dashed #d8d8d8; border-radius:14px;
    }

    /* Order note + WA preview */
    .note{
      margin-top:12px;
      background:#f5f5f5;
      border:1px solid #d8d8d8;
      border-radius:14px;
      padding:12px;
      display:grid;
      gap:10px;
    }
    .note textarea{
      width:100%;
      background:#ffffff;
      border:1px solid #d0d0d0;
      color:#1a1a1a;
      border-radius:12px;
      padding:12px;
      outline:none;
      min-height:90px;
      resize:vertical;
    }
    .note .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .pill{
      border:1px solid #d0d0d0; border-radius:999px; padding:8px 10px; color:#666; font-size:12px; font-weight:800;
      display:inline-flex; gap:8px; align-items:center;
    }
    .pill input{
      background:transparent; border:none; outline:none; color:#1a1a1a; font-weight:900;
      width:150px;
    }

    @media (max-width:980px){
      .tools{ grid-template-columns: 1fr; }
    }
    @media (max-width:768px){
      nav#nav-links{ display:none; }
      .menu-btn{ display:inline-flex; align-items:center; justify-content:center; }
      .hero{ height:28vh; }
      .grid{ grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:10px; }
      .section-title{ font-size:22px; padding:10px 14px; margin:40px 0 16px; }
      .card-content{ padding:9px; }
      .card-content h3{ font-size:14px; margin-bottom:3px; }
      .card-content p{ font-size:10px; min-height:24px; margin-bottom:6px; }
      .btn-add{ font-size:8px; padding:5px 10px; }
    }

    /* =========================================================
       (EKLENDİ) PREMIUM IMAGE UX: blur-up + hover zoom + skeleton
       ========================================================= */
    .card-img{
      filter: blur(14px);
      transform: scale(1.03);
      transition: filter 450ms ease, transform 450ms ease;
      will-change: filter, transform;
    }
    .card-img.loaded{
      filter: blur(0);
      transform: scale(1);
      animation:zoomIn 0.5s ease;
    }
    @keyframes zoomIn{
      from{
        transform: scale(0.95);
      }
      to{
        transform: scale(1);
      }
    }
    .card:hover .card-img.loaded{
      transform: scale(1.08);
      filter: brightness(1.1);
    }
    .img-skeleton{
      position:absolute;
      inset:0;
      background: linear-gradient(90deg, #121212 25%, #1b1b1b 37%, #121212 63%);
      background-size: 400% 100%;
      animation: shimmer 1.2s infinite;
      z-index: 0;
    }
    .card-img{ position:relative; z-index:1; }
    @keyframes shimmer{
      0%{ background-position: 100% 0; }
      100%{ background-position: 0 0; }
    }
    @media (max-width:480px){
      .grid{ grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:8px; }
      .card-content p{ font-size:9px; }
    }

    /* =========================================================
       ENHANCED PRODUCT MODAL STYLES
       ========================================================= */
    .product-modal-detail {
      display: grid;
      gap: 16px;
    }
    .product-modal-detail .pm-image {
      width: 100%;
      max-height: 350px;
      object-fit: cover;
      border-radius: 12px;
      animation: modalImageZoom 0.4s ease;
    }
    @keyframes modalImageZoom {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    .product-modal-detail h3 {
      font-family: "Playfair Display", serif;
      font-size: 24px;
      color: var(--gold);
      margin: 0;
    }
    .product-modal-detail .pm-price {
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold), #e8c547);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .product-modal-detail .pm-desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .product-modal-detail .pm-long-desc {
      color: var(--text);
      font-size: 13px;
      line-height: 1.7;
      padding: 12px;
      background: #fafafa;
      border-radius: 10px;
      border-left: 3px solid var(--gold);
    }
    .product-modal-detail .pm-allergens {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      background: #fff5e6;
      border-radius: 10px;
      border: 1px solid rgba(184,134,11,0.2);
    }
    .product-modal-detail .pm-allergens-title {
      width: 100%;
      font-size: 12px;
      font-weight: 800;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .product-modal-detail .pm-allergen-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: white;
      border: 1px solid var(--gold);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }
    .product-modal-detail .pm-allergen-badge .allergen-icon {
      font-size: 10px;
    }
    .product-modal-detail .pm-add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
    }
    .product-modal-detail .pm-add-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 25px rgba(184,134,11,0.4);
    }
    .product-modal-detail .pm-add-btn.added {
      background: #4CAF50;
    }

    /* =========================================================
       STAGGERED GRID ANIMATION
       ========================================================= */
    .grid .card {
      opacity: 0;
      animation: cardFadeInUp 0.5s ease forwards;
    }
    @keyframes cardFadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* =========================================================

const productById = Object.fromEntries(products.map(p => [p.id, p]));

    // ----------------------------
    // Storage
    // ----------------------------
    function loadCart(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return {};
        const parsed = JSON.parse(raw);
        return (parsed && typeof parsed === "object") ? parsed : {};
      }catch{ return {}; }
    }
    function saveCart(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
    }
    function loadSettings(){
      try{
        const raw = localStorage.getItem(SETTINGS_KEY);
        if(!raw) return;
        const s = JSON.parse(raw) || {};
        if(s.currency) currency = s.currency;
        if(typeof s.tryRate === "number") tryRate = s.tryRate;
        if(s.lang) currentLang = s.lang;
        if(s.waNumber) document.getElementById("waNumber").value = s.waNumber;
      }catch{}
      // sync inputs
      document.getElementById("tryRate").value = String(tryRate);
      updateCurrencyBtn();
    }
    function saveSettings(){
      const waNumber = document.getElementById("waNumber").value.trim();
      const s = { currency, tryRate, lang: currentLang, waNumber };
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
    }

    // (EKLENDİ) Order note persistence (ayrı key)
    function loadOrderNote(){
      try{
        const raw = localStorage.getItem(NOTE_KEY);
        if(!raw) return;
        const noteEl = document.getElementById("orderNote");
        if(noteEl) noteEl.value = String(raw);
      }catch{}
    }
    function saveOrderNote(){
      try{
        const noteEl = document.getElementById("orderNote");
        const v = (noteEl?.value || "").toString();
        localStorage.setItem(NOTE_KEY, v);
      }catch{}
    }

    // ----------------------------
    // Money / helpers
    // ----------------------------
    function clampQty(n){ return Math.max(0, Math.min(99, n)); }
    function escapeHtml(v){
      return String(v ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getSymbol(){
      return currency === "TRY" ? "₺" : "€";
    }
    function toDisplayAmount(eur){
      if(currency === "TRY") return eur * (Number(tryRate)||0);
      return eur;
    }
    function formatMoney(eur){
      const amount = toDisplayAmount(eur);
      const sym = getSymbol();
      return `${sym} ${amount.toFixed(2)}`;
    }

    function cartCount(){
      return Object.values(cart).reduce((a,b) => a + (Number(b)||0), 0);
    }
    function cartTotalEUR(){
      let sum = 0;
      for(const [id, qty] of Object.entries(cart)){
        const p = productById[id];
        if(p) sum += p.p * (Number(qty)||0);
      }
      return sum;
    }

    // ----------------------------
    // Filters & sort
    // ----------------------------
    function getFilteredProducts(){
      const q = (document.getElementById("searchInput").value || "").trim().toLowerCase();
      const cat = document.getElementById("catFilter").value;
      const sort = document.getElementById("sortSelect").value;

      let list = [...products];

      if(cat !== "all"){
        list = list.filter(p => p.cat === cat);
      }

      if(q){
        list = list.filter(p => {
          const item = p[currentLang];
          const text = `${item?.n||""} ${item?.d||""}`.toLowerCase();
          return text.includes(q);
        });
      }

      if(sort === "price_asc") list.sort((a,b)=>a.p-b.p);
      else if(sort === "price_desc") list.sort((a,b)=>b.p-a.p);
      else if(sort === "name_asc") list.sort((a,b)=>{
        const an=(a[currentLang]?.n||"").toLowerCase();
        const bn=(b[currentLang]?.n||"").toLowerCase();
        return an.localeCompare(bn);
      });
      else if(sort === "name_desc") list.sort((a,b)=>{
        const an=(a[currentLang]?.n||"").toLowerCase();
        const bn=(b[currentLang]?.n||"").toLowerCase();
        return bn.localeCompare(an);
      });

      return list;
    }

    // ----------------------------
    // Render
    // ----------------------------
    function buildNavHTML(t){
      return `
        <a href="#br">${t.categories.br}</a>
        <a href="#sn">${t.categories.sn}</a>
        <a href="#cf">${t.categories.cf}</a>
        <a href="#ds">${t.categories.ds}</a>
        <a href="#bd">${t.categories.bd}</a>
        <a href="#sl">${t.categories.sl}</a>
        <a href="#feedback-area">${t.contact}</a>
      `;
    }

    function renderToolsTexts(){
      const t = translations[currentLang];
      document.getElementById("searchLabel").innerText = t.searchLabel;
      document.getElementById("searchInput").placeholder = t.searchPH;
      document.getElementById("searchHint").innerText = t.searchHint || "";

      document.getElementById("filterLabel").innerText = t.catLabel;
      document.getElementById("sortLabel").innerText = t.sortLabel;
      document.getElementById("filterHint").innerText = t.filterHint || "";

      const catSel = document.getElementById("catFilter");
      const currentVal = catSel.value;
      catSel.innerHTML = `
        <option value="all">${t.all}</option>
        <option value="br">${t.categories.br}</option>
        <option value="sn">${t.categories.sn}</option>
        <option value="cf">${t.categories.cf}</option>
        <option value="ds">${t.categories.ds}</option>
        <option value="bd">${t.categories.bd}</option>
        <option value="sl">${t.categories.sl}</option>
      `;
      catSel.value = currentVal || "all";

      const sortSel = document.getElementById("sortSelect");
      const sortVal = sortSel.value;
      sortSel.innerHTML = `
        <option value="featured">${t.featured}</option>
        <option value="price_asc">${t.priceAsc}</option>
        <option value="price_desc">${t.priceDesc}</option>
        <option value="name_asc">${t.nameAsc}</option>
        <option value="name_desc">${t.nameDesc}</option>
      `;
      sortSel.value = sortVal || "featured";

      document.getElementById("rateHint").innerText = t.rateHint;
      // hints updated above
      document.getElementById("waMini").innerText = t.waMini;
    }

    function renderMenu(){
      const t = translations[currentLang];

      document.documentElement.lang = currentLang;
      document.getElementById("langBtn").innerText = (currentLang === "tr") ? "EN" : "TR";
      document.getElementById("heroTitle").innerHTML = t.hero;

      const nav = buildNavHTML(t);
      document.getElementById("nav-links").innerHTML = nav;
      document.getElementById("drawerLinks").innerHTML = nav;

      renderToolsTexts();

      const cat = document.getElementById("catFilter").value;
      const list = getFilteredProducts();

      let html = "";
      if(cat === "all"){
        for(const k of Object.keys(t.categories)){
          const group = list.filter(p => p.cat === k);
          if(group.length === 0) continue;
          html += `<h2 class="section-title" id="${k}">${t.categories[k]}</h2><div class="grid">`;
          group.forEach(p => html += renderCard(p));
          html += `</div>`;
        }
      } else {
        const title = t.categories[cat];
        html += `<h2 class="section-title" id="${cat}">${title}</h2><div class="grid">`;
        list.forEach(p => html += renderCard(p));
        html += `</div>`;
      }

      document.getElementById("menu-content").innerHTML = html;

      document.getElementById("feedback-area").innerHTML = `
        <div class="feedback-container">
          <h2>${t.feedbackTitle}</h2>
          <p style="text-align:center; color:#666; margin-top:8px">${t.feedbackSub}</p>
          <form class="f-form" id="feedbackForm">
            <input type="text" name="name" placeholder="${t.name}" required>
            <textarea rows="4" name="message" placeholder="${t.msg}" required></textarea>
            <button class="submit-btn" type="submit">${t.send}</button>
          </form>
        </div>
      `;

      document.getElementById("cartModalTitle").innerText = t.modalCartTitle;
      document.getElementById("clearCartBtn").innerText = t.clear;
      document.getElementById("checkoutBtn").innerText = t.checkout;
      document.getElementById("waSendBtn").innerText = t.waSend;

      updateCartUI();
      renderCartModalBody();
      updateCurrencyBtn();
      saveSettings();

      // ==========================================
      // Görselleri premium şekilde yönet
      // ==========================================
      initPremiumImages();
    }

    // renderCard içine skeleton + alt + fallback attribute + badge eklendi
    function renderCard(p){
      const item = p[currentLang];
      const name = item?.n ?? "";
      const desc = item?.d ?? "";
      const altText = p.alt?.[currentLang] || name;
      const safeName = escapeHtml(name);
      const safeDesc = escapeHtml(desc);
      const safeAlt = escapeHtml(altText);
      const t = translations[currentLang];
      const catName = t.categories?.[p.cat] || "";
      const safeCatName = escapeHtml(catName);
      const cardAria = `${name} - ${desc} - ${formatMoney(p.p)}`;
      const safeCardAria = escapeHtml(cardAria);

      return `
        <article class="card" data-id="${p.id}" role="button" tabindex="0" aria-label="${safeCardAria}">
          <div class="card-badge-area">
            <span class="badge">${safeCatName}</span>
          </div>
          <div class="img-skeleton" aria-hidden="true"></div>
          <img
            src="${p.i}"
            class="card-img"
            loading="lazy"
            alt="${safeAlt}"
            data-fallback="${FALLBACK_IMG}"
          >
          <div class="card-content">
            <h3>${safeName}</h3>
            <p>${safeDesc}</p>
            <div class="card-footer">
              <span class="price">${formatMoney(p.p)}</span>
              <button class="btn-add" type="button" data-add="${p.id}">${translations[currentLang].add}</button>
            </div>
          </div>
        </article>
      `;
    }

    function updateCurrencyBtn(){
      const btn = document.getElementById("currencyBtn");
      if(currency === "TRY") btn.innerText = "₺ TRY";
      else btn.innerText = "€ EUR";
      document.getElementById("tryRate").value = String(tryRate);
    }

    function updateCartUI(){
      const t = translations[currentLang];
      const totalEUR = cartTotalEUR();
      document.getElementById("cartLabel").innerText = `${t.cart} / ${formatMoney(totalEUR)}`;
      document.getElementById("cartCount").innerText = String(cartCount());
      document.getElementById("cartTotalLine").innerText = `${t.total}: ${formatMoney(totalEUR)}`;
    }

    // generate small thumbnail URL for cart to save bandwidth
    function getThumbUrl(src, p){
      // preferentially generate query from product name when source is unsplash
      if(typeof src === "string" && src.startsWith("https://images.unsplash.com")){
        // Fix: source.unsplash.com is deprecated, use images.unsplash.com with specific ID
        // For cart thumbnails, just resize the original image
        return src.replace(/w=\d+/g, "w=200").replace(/q=\d+/g, "q=70");
      }
      return src;
    }

    function renderCartModalBody(){
      const t = translations[currentLang];
      const container = document.getElementById("cartBody");
      const ids = Object.keys(cart).filter(id => (Number(cart[id])||0) > 0);

      if(ids.length === 0){
        container.innerHTML = `<div class="empty">${t.empty}</div>`;
        updateCartUI();
        return;
      }

      let html = `<div class="cart-list">`;
      for(const id of ids){
        const p = productById[id];
        if(!p) continue;
        const qty = Number(cart[id]) || 0;
        const item = p[currentLang];
        const name = item?.n ?? "";
        const desc = item?.d ?? "";
        const lineEUR = p.p * qty;

        html += `
          <div class="cart-item" data-id="${id}">
            <img src="${getThumbUrl(p.i,p)}" alt="${p.alt?.[currentLang] || name}" loading="lazy">
            <div>
              <div class="ci-title">${name}</div>
              <div class="ci-desc">${desc}</div>
              <div class="ci-desc" style="margin-top:6px; color:#aaa; font-weight:900;">
                ${formatMoney(p.p)} × ${qty} = ${formatMoney(lineEUR)}
              </div>
            </div>
            <div class="ci-right">
              <div class="qty" aria-label="Quantity">
                <button type="button" data-qty="dec" aria-label="Decrease">−</button>
                <span>${qty}</span>
                <button type="button" data-qty="inc" aria-label="Increase">+</button>
              </div>
              <button type="button" class="remove-btn" data-remove="1">Sil</button>
            </div>
          </div>
        `;
      }
      html += `</div>`;
      container.innerHTML = html;

      updateCartUI();
    }

    // ----------------------------
    // Cart actions
    // ----------------------------
    function addToCart(id, sourceBtn = null){
      if(!productById[id]) return;
      cart[id] = clampQty((Number(cart[id])||0) + 1);
      saveCart();
      updateCartUI();
      renderCartModalBody();

      if(sourceBtn){
        sourceBtn.classList.remove("adding");
        sourceBtn.classList.remove("added");
        void sourceBtn.offsetWidth;
        sourceBtn.classList.add("adding");
        sourceBtn.classList.add("added");
        setTimeout(() => sourceBtn.classList.remove("adding"), 420);
        setTimeout(() => sourceBtn.classList.remove("added"), 900);
      }

      const cartFloat = document.getElementById("cartFloat");
      if(cartFloat){
        cartFloat.classList.remove("bump");
        void cartFloat.offsetWidth;
        cartFloat.classList.add("bump");
        setTimeout(() => cartFloat.classList.remove("bump"), 420);
      }
    }

    function setQty(id, qty){
      if(!productById[id]) return;
      const q = clampQty(qty);
      if(q <= 0) delete cart[id];
      else cart[id] = q;
      saveCart();
      updateCartUI();
      renderCartModalBody();
    }

    function clearCart(){
      cart = {};
      saveCart();
      updateCartUI();
      renderCartModalBody();
    }

    // ----------------------------
    // WhatsApp order
    // ----------------------------
    function buildWhatsAppMessage(){
      const t = translations[currentLang];
      const ids = Object.keys(cart).filter(id => (Number(cart[id])||0) > 0);

      let lines = [];
      lines.push("CAFE 17 - ORDER");
      lines.push("--------------------");

      for(const id of ids){
        const p = productById[id];
        if(!p) continue;
        const qty = Number(cart[id])||0;
        const item = p[currentLang];
        const name = item?.n ?? id;
        const lineEUR = p.p * qty;

        lines.push(`${qty}x ${name} — ${formatMoney(lineEUR)}`);
      }

      lines.push("--------------------");
      lines.push(`${t.total}: ${formatMoney(cartTotalEUR())}`);

      if(currency === "TRY"){
        lines.push(`(Rate: 1€ = ${Number(tryRate||0).toFixed(2)}₺)`);
      }

      const note = (document.getElementById("orderNote").value || "").trim();
      if(note){
        lines.push("");
        lines.push("NOTE:");
        lines.push(note);
      }

      return lines.join("\n");
    }

    function sendToWhatsApp(){
      const t = translations[currentLang];
      if(cartCount() === 0){
        alert(t.empty);
        return;
      }

      const raw = document.getElementById("waNumber").value.trim();
      const number = raw.replace(/[^\d]/g, "");
      if(!number || number.length < 10){
        alert("WhatsApp numarası geçersiz görünüyor. Ülke kodu ile yaz: 90xxxxxxxxxx");
        return;
      }

      const msg = buildWhatsAppMessage();
      const url = `https://wa.me/${number}?text=${encodeURIComponent(msg)}`;
      window.open(url, "_blank", "noopener");
    }

    // ----------------------------
    // Drawer + Modal controls
    // ----------------------------
    const drawer = document.getElementById("drawer");
    const drawerBackdrop = document.getElementById("drawerBackdrop");
    const menuBtn = document.getElementById("menuBtn");
    const drawerClose = document.getElementById("drawerClose");

    function openDrawer(){
      drawer.classList.add("open");
      drawerBackdrop.classList.add("open");
      drawer.setAttribute("aria-hidden","false");
      drawerBackdrop.setAttribute("aria-hidden","false");
      menuBtn.setAttribute("aria-expanded","true");
    }
    function closeDrawer(){
      drawer.classList.remove("open");
      drawerBackdrop.classList.remove("open");
      drawer.setAttribute("aria-hidden","true");
      drawerBackdrop.setAttribute("aria-hidden","true");
      menuBtn.setAttribute("aria-expanded","false");
    }

    const cartModal = document.getElementById("cartModal");
    const cartBackdrop = document.getElementById("cartBackdrop");

    // (EKLENDİ) focus restore
    let lastFocusEl = null;

    function openCart(){
      lastFocusEl = document.activeElement;
      cartModal.classList.add("open");
      cartBackdrop.classList.add("open");
      cartModal.setAttribute("aria-hidden", "false");
      cartBackdrop.setAttribute("aria-hidden", "false");
      cartModal.focus();
      // (EKLENDİ) try to focus first meaningful control
      const first = cartModal.querySelector('button, [href], input, textarea, select, [tabindex]:not([tabindex="-1"])');
      if(first) first.focus();
    }
    function closeCart(){
      cartModal.classList.remove("open");
      cartBackdrop.classList.remove("open");
      cartModal.setAttribute("aria-hidden", "true");
      cartBackdrop.setAttribute("aria-hidden", "true");
      // (EKLENDİ) restore focus to where it came from (prefer cartFloat)
      const cartFloat = document.getElementById("cartFloat");
      if(lastFocusEl && typeof lastFocusEl.focus === "function") lastFocusEl.focus();
      else if(cartFloat) cartFloat.focus();
    }

    // ------------- product modal helpers --------------------
    const productModal = document.getElementById("productModal");
    const productBackdrop = document.getElementById("productBackdrop");

    function renderProductModalBody(id){
      const p = productById[id];
      if(!p) return;
      const item = p[currentLang] || {};
      const name = item.n || "";
      const desc = item.d || "";
      const longDesc = item.ld || ""; // uzun açıklama (isteğe bağlı)
      const price = formatMoney(p.p);
      const imgUrl = getThumbUrl(p.i, p);
      const alt = p.alt?.[currentLang] || name;
      const safeName = escapeHtml(name);
      const safeDesc = escapeHtml(desc);
      const safeLongDesc = escapeHtml(longDesc);
      const safeAlt = escapeHtml(alt);
      const addText = escapeHtml(translations[currentLang].add);
      const allergens = Array.isArray(p.allergens?.[currentLang]) ? p.allergens[currentLang] : [];
      const allergenHtml = allergens.length
        ? `
          <div class="pm-allergens">
            <div class="pm-allergens-title">${currentLang === "tr" ? "Alerjen Bilgisi" : "Allergen Info"}</div>
            ${allergens.map(a => `<span class="pm-allergen-badge"><span class="allergen-icon">!</span>${escapeHtml(a)}</span>`).join("")}
          </div>
        `
        : "";
      document.getElementById("productBody").innerHTML = `
        <div class="product-modal-detail">
          <img src="${imgUrl}" class="pm-image" alt="${safeAlt}" loading="lazy">
          <h3>${safeName}</h3>
          <p class="pm-desc">${safeDesc}</p>
          ${safeLongDesc ? `<p class="pm-long-desc">${safeLongDesc}</p>` : ``}
          ${allergenHtml}
          <div class="pm-price">${price}</div>
          <button class="pm-add-btn" type="button" data-add-modal="${p.id}">${addText}</button>
        </div>
      `;
    }

    function openProductModal(id){
      lastFocusEl = document.activeElement;
      if(!productById[id]) return;
      const titleEl = document.getElementById("productModalTitle");
      const item = productById[id][currentLang] || {};
      titleEl.innerText = item.n || "";
      // make aria-label meaningful as well
      productModal.setAttribute("aria-label", item.n || "Ürün");
      renderProductModalBody(id);
      productModal.classList.add("open");
      productBackdrop.classList.add("open");
      productModal.setAttribute("aria-hidden", "false");
      productBackdrop.setAttribute("aria-hidden", "false");
      productModal.focus();
      const first = productModal.querySelector('button, [href], input, textarea, select, [tabindex]:not([tabindex="-1"])');
      if(first) first.focus();
    }
    function closeProductModal(){
      productModal.classList.remove("open");
      productBackdrop.classList.remove("open");
      productModal.setAttribute("aria-hidden", "true");
      productBackdrop.setAttribute("aria-hidden", "true");
      if(lastFocusEl && typeof lastFocusEl.focus === "function") lastFocusEl.focus();
    }

    // =========================================================
    // (EKLENDİ) Modal focus trap (Tab içinde kalsın)
    // =========================================================
    function trapFocusInModal(e){
      // if neither modal is visible, nothing to trap
      const activeModal = cartModal.classList.contains("open") ? cartModal
                        : (productModal.classList.contains("open") ? productModal
                         : null);
      if(!activeModal) return;
      if(e.key !== "Tab") return;

      const focusables = activeModal.querySelectorAll(
        'button, [href], input, textarea, select, [tabindex]:not([tabindex="-1"])'
      );
      if(!focusables.length) return;

      const first = focusables[0];
      const last = focusables[focusables.length - 1];

      if(e.shiftKey){
        if(document.activeElement === first){
          e.preventDefault();
          last.focus();
        }
      } else {
        if(document.activeElement === last){
          e.preventDefault();
          first.focus();
        }
      }
    }

    // =========================================================
    // (EKLENDİ) Premium image init: blur-up + fallback + skeleton remove
    // =========================================================
    function initPremiumImages(){
      const imgs = document.querySelectorAll("img.card-img:not([data-premium-ready])");
      imgs.forEach(img => {
        img.setAttribute("data-premium-ready", "1");

        const skeleton = img.parentElement?.querySelector(".img-skeleton");

        const markLoaded = () => {
          img.classList.add("loaded");
          if(skeleton) skeleton.style.display = "none";
        };

        // already cached
        if(img.complete && img.naturalWidth > 0){
          markLoaded();
        } else {
          img.addEventListener("load", markLoaded, { once:true });
        }

        img.addEventListener("error", () => {
          const fb = img.getAttribute("data-fallback") || FALLBACK_IMG;
          // sonsuz döngüyü engelle
          if(img.src !== fb){
            img.src = fb;
          } else {
            // fallback da bozulursa skeleton kapat
            if(skeleton) skeleton.style.display = "none";
          }
        }, { once:false });
      });
    }

    // ----------------------------
    // Events
    // ----------------------------
    document.addEventListener("click", (e) => {
      // detay için ürün kartına tıklanmış mı?
      const cardEl = e.target.closest("article.card[data-id]");
      if(cardEl && !e.target.closest("[data-add]")){
        openProductModal(cardEl.getAttribute("data-id"));
        return;
      }

      const addBtn = e.target.closest("[data-add]");
      if(addBtn){
        addToCart(addBtn.getAttribute("data-add"), addBtn);
        return;
      }

      const modalAddBtn = e.target.closest("[data-add-modal]");
      if(modalAddBtn){
        addToCart(modalAddBtn.getAttribute("data-add-modal"), modalAddBtn);
        return;
      }

      const qtyBtn = e.target.closest("[data-qty]");
      if(qtyBtn){
        const itemEl = e.target.closest(".cart-item");
        if(!itemEl) return;
        const id = itemEl.getAttribute("data-id");
        const action = qtyBtn.getAttribute("data-qty");
        const current = Number(cart[id]) || 0;
        setQty(id, action === "inc" ? current + 1 : current - 1);
        return;
      }

      const rmBtn = e.target.closest("[data-remove]");
      if(rmBtn){
        const itemEl = e.target.closest(".cart-item");
        if(!itemEl) return;
        const id = itemEl.getAttribute("data-id");
        setQty(id, 0);
        return;
      }
    });

    // Search/filter/sort re-render
    // (DÜZENLENDİ) double render engellendi: searchInput -> input, select'ler -> change
    document.getElementById("searchInput").addEventListener("input", () => renderMenu());
    document.getElementById("catFilter").addEventListener("change", () => renderMenu());
    document.getElementById("sortSelect").addEventListener("change", () => renderMenu());

    // Language toggle
    document.getElementById("langBtn").addEventListener("click", () => {
      currentLang = (currentLang === "tr") ? "en" : "tr";
      renderMenu();
    });

    // Currency toggle
    document.getElementById("currencyBtn").addEventListener("click", () => {
      currency = (currency === "EUR") ? "TRY" : "EUR";
      updateCurrencyBtn();
      renderMenu();
    });

    // Rate input
    document.getElementById("tryRate").addEventListener("input", (e) => {
      const v = Number(String(e.target.value).replace(",", "."));
      if(Number.isFinite(v) && v > 0) tryRate = v;
      saveSettings();
      updateCartUI();
      renderCartModalBody();
      renderMenu();
    });

    // WhatsApp number persist
    document.getElementById("waNumber").addEventListener("input", saveSettings);

    // (EKLENDİ) Order note persist
    document.getElementById("orderNote").addEventListener("input", saveOrderNote);

    // Drawer controls
    menuBtn.addEventListener("click", () => {
      if(drawer.classList.contains("open")) closeDrawer();
      else openDrawer();
    });
    drawerClose.addEventListener("click", closeDrawer);
    drawerBackdrop.addEventListener("click", closeDrawer);
    document.getElementById("drawerLinks").addEventListener("click", (e) => {
      if(e.target.tagName === "A") closeDrawer();
    });

    // Cart modal controls
    document.getElementById("cartFloat").addEventListener("click", openCart);
    document.getElementById("cartClose").addEventListener("click", closeCart);
    cartBackdrop.addEventListener("click", closeCart);

    // product modal controls
    document.getElementById("productClose").addEventListener("click", closeProductModal);
    productBackdrop.addEventListener("click", closeProductModal);

    document.getElementById("clearCartBtn").addEventListener("click", clearCart);
    document.getElementById("waSendBtn").addEventListener("click", sendToWhatsApp);

    document.getElementById("checkoutBtn").addEventListener("click", () => {
      const t = translations[currentLang];
      if(cartCount() === 0){
        alert(t.empty);
        return;
      }
      alert(`${t.total}: ${formatMoney(cartTotalEUR())}\n\n(Demo — ödeme için backend gerekir.)`);
    });

    // Feedback submit (demo)
    document.addEventListener("submit", (e) => {
      if(e.target && e.target.id === "feedbackForm"){
        e.preventDefault();
        alert("Success!");
        e.target.reset();
      }
    });

    // ESC to close drawer/cart + (EKLENDİ) focus trap Tab
    document.addEventListener("keydown", (e) => {
      const cardEl = e.target?.closest?.("article.card[data-id]");
      if(cardEl && (e.key === "Enter" || e.key === " ")){
        e.preventDefault();
        openProductModal(cardEl.getAttribute("data-id"));
        return;
      }

      if(e.key === "Escape"){
        closeDrawer();
        closeCart();
        closeProductModal();
      }
      trapFocusInModal(e);
    });

    // Init
    renderMenu();
    setRandomHero(); // (EKLENDİ)
  </script>
</body>
</html>
