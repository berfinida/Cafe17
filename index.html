<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cafe 17 | Gourmet & Patisserie Menu" />
  <title>Cafe 17 | Gourmet & Patisserie</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold:#d4af37; --bg:#0c0c0c; --card:#161616; --text:#eee; --muted:#aaa;
      --panel:#0b0b0b; --stroke:#222; --stroke2:#333;
      --radius:16px;
    }
    *{ margin:0; padding:0; box-sizing:border-box; font-family:"Inter",sans-serif; }
    body{ background:var(--bg); color:var(--text); scroll-behavior:smooth; overflow-x:hidden; }

    header{
      padding: 14px 5%;
      display:flex; justify-content:space-between; align-items:center; gap:16px;
      background: rgba(0,0,0,0.98);
      position: sticky; top: 0; z-index: 2000;
      border-bottom: 1px solid rgba(212,175,55,0.2);
      backdrop-filter: blur(15px);
    }
    .logo{
      font-family:"Playfair Display",serif; color:var(--gold);
      font-size:28px; text-decoration:none; font-weight:900;
      letter-spacing:0.5px; white-space:nowrap;
    }

    .nav-controls{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    nav{ display:flex; gap:14px; align-items:center; }
    nav a{
      color:#aaa; text-decoration:none; font-size:11px; text-transform:uppercase;
      letter-spacing:1px; font-weight:800; transition:0.25s;
    }
    nav a:hover{ color:var(--gold); }

    .btn-outline, .btn-solid, .menu-btn{
      border-radius:10px; cursor:pointer; font-weight:900;
      font-size:12px; letter-spacing:0.4px;
      padding:8px 12px;
      transition:0.2s;
      white-space:nowrap;
    }
    .btn-outline, .menu-btn{
      background:transparent; border:1px solid var(--gold); color:var(--gold);
    }
    .btn-outline:hover, .menu-btn:hover{ background:var(--gold); color:#000; }
    .btn-solid{
      background:var(--gold); border:1px solid var(--gold); color:#000;
    }
    .btn-solid:hover{ filter:brightness(0.95); }

    .menu-btn{ display:none; padding:8px 12px; }

    .hero{
      height:32vh; display:flex; align-items:center; justify-content:center; text-align:center;
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
        url("https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=1600&q=80");
      background-size:cover; background-position:center;
    }
    .hero h1{ font-family:"Playfair Display",serif; font-size:clamp(25px,5vw,48px); color:#fff; }
    .hero h1 span{ color:var(--gold); }

    .container{ padding:28px 5% 40px; max-width:1400px; margin:0 auto; }

    /* Top tools (search/filter/currency) */
    .tools{
      display:grid;
      grid-template-columns: 1.3fr 0.9fr 0.8fr;
      gap:12px;
      margin: 10px 0 18px;
      align-items:stretch;
    }
    .tool-card{
      background: #0f0f0f;
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      padding: 12px;
      display:flex; gap:10px; align-items:center;
      min-height:54px;
    }
    .tool-card label{
      font-size:11px; color:#777; font-weight:800; letter-spacing:0.6px; text-transform:uppercase;
      display:block; margin-bottom:6px;
    }
    .tool-input{
      width:100%;
      background:#000;
      border:1px solid var(--stroke2);
      color:#fff;
      border-radius:12px;
      padding:12px 12px;
      outline:none;
      font-weight:700;
    }
    .tool-select{
      width:100%;
      background:#000;
      border:1px solid var(--stroke2);
      color:#fff;
      border-radius:12px;
      padding:12px 12px;
      outline:none;
      font-weight:800;
      cursor:pointer;
    }
    .mini{
      font-size:11px; color:#888; line-height:1.25;
    }

    .section-title{
      margin:56px 0 26px;
      border-left:5px solid var(--gold);
      padding-left:18px;
      font-family:"Playfair Display",serif;
      font-size:32px; color:#fff;
    }
    .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:26px; }

    .card{
      background:var(--card); border-radius:12px; overflow:hidden;
      border:1px solid #222; display:flex; flex-direction:column;
      transition:0.25s;
      position:relative; /* (EKLENDİ) skeleton için */
    }
    .card:hover{
      transform:translateY(-8px); border-color:var(--gold);
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }
    .card-img{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }

    .card-content{ padding:18px; flex-grow:1; display:flex; flex-direction:column; }
    .card-content h3{
      font-family:"Playfair Display",serif; font-size:20px;
      margin-bottom:8px; color:var(--gold);
    }
    .card-content p{
      font-size:13px; color:var(--muted);
      margin-bottom:14px; min-height:40px; line-height:1.4;
    }
    .card-footer{
      display:flex; justify-content:space-between; align-items:center;
      margin-top:auto; padding-top:14px; border-top:1px solid #222;
      gap:12px;
    }
    .price{ font-weight:900; font-size:18px; }
    .btn-add{
      border:1px solid var(--gold); color:var(--gold);
      padding:8px 15px; border-radius:10px;
      cursor:pointer; background:transparent;
      font-size:10px; font-weight:900; text-transform:uppercase;
      letter-spacing:0.6px; transition:0.2s;
      white-space:nowrap;
    }
    .btn-add:hover{ background:var(--gold); color:#000; }

    .feedback-section{ background:#0a0a0a; padding:60px 5%; border-top:1px solid #222; margin-top:48px; }
    .feedback-container{ max-width:650px; margin:0 auto; background:#111; padding:40px; border-radius:15px; border:1px solid #333; }
    .feedback-container h2{ font-family:"Playfair Display",serif; text-align:center; color:#fff; }
    .f-form{ display:grid; gap:15px; margin-top:25px; }
    .f-form input, .f-form textarea{
      width:100%; padding:12px; background:#000;
      border:1px solid #333; color:#fff; border-radius:12px; outline:none;
    }
    .submit-btn{
      background:var(--gold); color:#000; border:none;
      padding:15px; border-radius:12px;
      font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:0.6px;
    }

    .cart-float{
      position:fixed; bottom:22px; right:22px;
      background:var(--gold); color:#000;
      padding:14px 16px; border-radius:999px;
      font-weight:900; z-index:3000; cursor:pointer;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
      display:flex; gap:10px; align-items:center;
      user-select:none;
    }
    .badge{
      background:#000; color:var(--gold);
      padding:4px 10px; border-radius:999px;
      font-size:12px; font-weight:900;
    }

    footer{ padding:40px; text-align:center; color:#444; font-size:12px; }

    /* Drawer (mobile nav) */
    .drawer-backdrop{
      position:fixed; inset:0; background:rgba(0,0,0,0.6);
      display:none; z-index:2500;
    }
    .drawer{
      position:fixed; top:0; right:-380px; height:100%; width:min(380px, 86vw);
      background:var(--panel); border-left:1px solid rgba(212,175,55,0.25);
      z-index:2600; padding:18px;
      transition:0.25s ease;
      display:flex; flex-direction:column; gap:12px;
    }
    .drawer.open{ right:0; }
    .drawer-backdrop.open{ display:block; }
    .drawer .drawer-top{
      display:flex; justify-content:space-between; align-items:center;
      padding-bottom:10px; border-bottom:1px solid #222;
    }
    .drawer-title{
      font-family:"Playfair Display",serif; color:var(--gold);
      font-size:20px; font-weight:900;
    }
    .drawer nav{ display:flex; flex-direction:column; gap:10px; padding-top:10px; }
    .drawer nav a{ font-size:12px; }

    /* Cart modal */
    .modal-backdrop{
      position:fixed; inset:0; background:rgba(0,0,0,0.65);
      display:none; z-index:4000;
    }
    .modal{
      position:fixed; left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:min(820px, 94vw);
      background:var(--panel);
      border:1px solid rgba(212,175,55,0.25);
      border-radius:18px;
      z-index:4100;
      display:none;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.7);
    }
    .modal.open, .modal-backdrop.open{ display:block; }
    .modal-header{
      padding:16px 18px; display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid #222;
      gap:10px;
    }
    .modal-header h3{
      font-family:"Playfair Display",serif;
      color:#fff; font-size:20px;
    }
    .xbtn{
      background:transparent; border:1px solid var(--gold); color:var(--gold);
      padding:8px 12px; border-radius:10px; cursor:pointer; font-weight:900;
      white-space:nowrap;
    }
    .modal-body{ padding:16px 18px; }
    .cart-list{ display:grid; gap:10px; }
    .cart-item{
      display:grid; grid-template-columns:64px 1fr auto;
      gap:12px; align-items:center;
      padding:10px; border:1px solid #1f1f1f; border-radius:14px;
      background:#0f0f0f;
    }
    .cart-item img{ width:64px; height:64px; border-radius:12px; object-fit:cover; }
    .ci-title{ font-weight:900; color:#fff; font-size:14px; }
    .ci-desc{ color:#777; font-size:12px; margin-top:2px; line-height:1.35; }
    .ci-right{ display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
    .qty{
      display:flex; align-items:center; gap:8px;
      border:1px solid #222; border-radius:999px; padding:6px 10px;
    }
    .qty button{
      background:transparent; border:1px solid var(--gold); color:var(--gold);
      width:30px; height:30px; border-radius:999px; cursor:pointer; font-weight:900;
    }
    .qty span{ min-width:18px; text-align:center; font-weight:900; color:#fff; }
    .remove-btn{
      border:1px solid #444; color:#ddd; background:transparent;
      padding:7px 10px; border-radius:12px; cursor:pointer; font-weight:800; font-size:12px;
    }
    .remove-btn:hover{ border-color:#666; }
    .modal-footer{
      padding:14px 18px; border-top:1px solid #222;
      display:flex; justify-content:space-between; align-items:center; gap:12px;
      flex-wrap:wrap;
    }
    .total-line{ font-weight:900; font-size:16px; }
    .actions{ display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .empty{
      color:#777; text-align:center; padding:30px 10px;
      border:1px dashed #2a2a2a; border-radius:14px;
    }

    /* Order note + WA preview */
    .note{
      margin-top:12px;
      background:#0f0f0f;
      border:1px solid #1f1f1f;
      border-radius:14px;
      padding:12px;
      display:grid;
      gap:10px;
    }
    .note textarea{
      width:100%;
      background:#000;
      border:1px solid #333;
      color:#fff;
      border-radius:12px;
      padding:12px;
      outline:none;
      min-height:90px;
      resize:vertical;
    }
    .note .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .pill{
      border:1px solid #333; border-radius:999px; padding:8px 10px; color:#bbb; font-size:12px; font-weight:800;
      display:inline-flex; gap:8px; align-items:center;
    }
    .pill input{
      background:transparent; border:none; outline:none; color:#fff; font-weight:900;
      width:150px;
    }

    @media (max-width:980px){
      .tools{ grid-template-columns: 1fr; }
    }
    @media (max-width:768px){
      nav#nav-links{ display:none; }
      .menu-btn{ display:inline-flex; align-items:center; justify-content:center; }
      .hero{ height:28vh; }
      .section-title{ font-size:26px; }
    }

    /* =========================================================
       (EKLENDİ) PREMIUM IMAGE UX: blur-up + hover zoom + skeleton
       ========================================================= */
    .card-img{
      filter: blur(14px);
      transform: scale(1.03);
      transition: filter 450ms ease, transform 450ms ease;
      will-change: filter, transform;
    }
    .card-img.loaded{
      filter: blur(0);
      transform: scale(1);
    }
    .card:hover .card-img.loaded{
      transform: scale(1.06);
    }
    .img-skeleton{
      position:absolute;
      inset:0;
      background: linear-gradient(90deg, #121212 25%, #1b1b1b 37%, #121212 63%);
      background-size: 400% 100%;
      animation: shimmer 1.2s infinite;
      z-index: 0;
    }
    .card-img{ position:relative; z-index:1; }
    @keyframes shimmer{
      0%{ background-position: 100% 0; }
      100%{ background-position: 0 0; }
    }
  </style>
</head>

<body>
  <header>
    <a href="#" class="logo" aria-label="Cafe 17 Ana Sayfa">CAFE 17</a>

    <div class="nav-controls">
      <nav id="nav-links" aria-label="Üst Menü"></nav>

      <button class="menu-btn" id="menuBtn" aria-label="Menüyü Aç/Kapat" aria-expanded="false" type="button">☰</button>
      <button class="btn-outline" id="currencyBtn" type="button" aria-label="Para birimi değiştir">€ EUR</button>
      <button class="btn-outline" id="langBtn" type="button">EN</button>
    </div>
  </header>

  <div class="hero">
    <h1 id="heroTitle">CAFE 17 <span>MENU</span></h1>
  </div>

  <main class="container">
    <!-- Search / Filter / Sort + rate -->
    <div class="tools" aria-label="Menü Araçları">
      <div class="tool-card" style="display:block;">
        <label id="searchLabel" for="searchInput">Arama</label>
        <input id="searchInput" class="tool-input" type="search" placeholder="Ürün ara... (örn: tiramisu, v60)" />
        <div class="mini" id="searchHint" style="margin-top:8px;">İpucu: Arama isim + açıklamada çalışır.</div>
      </div>

      <div class="tool-card" style="display:block;">
        <label id="filterLabel" for="catFilter">Kategori</label>
        <select id="catFilter" class="tool-select" aria-label="Kategori filtre">
          <option value="all">Tümü</option>
          <option value="br">Kahvaltı</option>
          <option value="sn">Sandviç & Tost</option>
          <option value="cf">Kahve & Çay</option>
          <option value="ds">İmza Tatlılar</option>
        </select>
        <div class="mini" id="filterHint" style="margin-top:8px;">Kategori seçince liste buna göre daralır.</div>
      </div>

      <div class="tool-card" style="display:block;">
        <label id="sortLabel" for="sortSelect">Sırala</label>
        <select id="sortSelect" class="tool-select" aria-label="Sıralama">
          <option value="featured">Önerilen</option>
          <option value="price_asc">Fiyat (Artan)</option>
          <option value="price_desc">Fiyat (Azalan)</option>
          <option value="name_asc">İsim (A→Z)</option>
          <option value="name_desc">İsim (Z→A)</option>
        </select>
        <div class="mini" id="rateHint" style="margin-top:8px;">TRY için kur: otomatik değil (elle ayarlanır).</div>
      </div>
    </div>

    <div id="menu-content"></div>
  </main>

  <section class="feedback-section" id="feedback-area"></section>

  <button class="cart-float" id="cartFloat" type="button" aria-label="Sepeti Aç">
    <span id="cartLabel">SEPET / € 0.00</span>
    <span class="badge" id="cartCount">0</span>
  </button>

  <footer>CAFE 17 EST. 2026 - İSTANBUL</footer>

  <!-- Drawer -->
  <div class="drawer-backdrop" id="drawerBackdrop" aria-hidden="true"></div>
  <aside class="drawer" id="drawer" aria-label="Mobil Menü" aria-hidden="true">
    <div class="drawer-top">
      <div class="drawer-title">CAFE 17</div>
      <button class="xbtn" id="drawerClose" type="button" aria-label="Menüyü Kapat">✕</button>
    </div>
    <nav id="drawerLinks"></nav>
  </aside>

  <!-- Cart Modal -->
  <div class="modal-backdrop" id="cartBackdrop" aria-hidden="true"></div>
  <div class="modal" id="cartModal" role="dialog" aria-modal="true" aria-label="Sepet" tabindex="-1">
    <div class="modal-header">
      <h3 id="cartModalTitle">Sepet</h3>
      <button class="xbtn" id="cartClose" type="button" aria-label="Sepeti Kapat">✕</button>
    </div>

    <div class="modal-body">
      <div id="cartBody"></div>

      <div class="note">
        <div class="row">
          <div class="pill" title="WhatsApp numarası">
            <span>WA</span>
            <input id="waNumber" value="905000000000" inputmode="numeric" aria-label="WhatsApp numarası (ülke kodu ile)" />
          </div>
          <div class="pill" title="TRY kuru (1 EUR kaç TL?)">
            <span>1€ =</span>
            <input id="tryRate" value="35" inputmode="decimal" aria-label="TRY kuru" />
            <span>₺</span>
          </div>
        </div>

        <textarea id="orderNote" placeholder="Not: Şekersiz, az buz, ekstra süt, paket servis vb..."></textarea>
        <div class="mini" id="waMini">Siparişi WhatsApp ile göndermek için “WhatsApp’a Gönder” butonuna bas.</div>
      </div>
    </div>

    <div class="modal-footer">
      <div class="total-line" id="cartTotalLine">Toplam: € 0.00</div>
      <div class="actions">
        <button class="btn-outline" id="clearCartBtn" type="button">Sepeti Temizle</button>
        <button class="btn-outline" id="waSendBtn" type="button">WhatsApp’a Gönder</button>
        <button class="btn-solid" id="checkoutBtn" type="button">Siparişi Tamamla</button>
      </div>
    </div>
  </div>

    // ----------------------------

    function loadCart(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return {};
        const parsed = JSON.parse(raw);
        return (parsed && typeof parsed === "object") ? parsed : {};
      }catch{ return {}; }
    }
    function saveCart(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
    }
    function loadSettings(){
      try{
        const raw = localStorage.getItem(SETTINGS_KEY);
        if(!raw) return;
        const s = JSON.parse(raw) || {};
        if(s.currency) currency = s.currency;
        if(typeof s.tryRate === "number") tryRate = s.tryRate;
        if(s.lang) currentLang = s.lang;
        if(s.waNumber) document.getElementById("waNumber").value = s.waNumber;
      }catch{}
      // sync inputs
      document.getElementById("tryRate").value = String(tryRate);
      updateCurrencyBtn();
    }
    function saveSettings(){
      const waNumber = document.getElementById("waNumber").value.trim();
      const s = { currency, tryRate, lang: currentLang, waNumber };
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));

    // ----------------------------
    // Money / helpers

    function clampQty(n){ return Math.max(0, Math.min(99, n)); }

    function getSymbol(){
      return currency === "TRY" ? "₺" : "€";
    }
    function toDisplayAmount(eur){
      if(currency === "TRY") return eur * (Number(tryRate)||0);
      return eur;
    }
    function formatMoney(eur){
      const amount = toDisplayAmount(eur);
      const sym = getSymbol();
      return `${sym} ${amount.toFixed(2)}`;
    }

    function cartCount(){
      return Object.values(cart).reduce((a,b) => a + (Number(b)||0), 0);
    }
    function cartTotalEUR(){
      let sum = 0;
      for(const [id, qty] of Object.entries(cart)){
        const p = productById[id];
        if(p) sum += p.p * (Number(qty)||0);
      }
      return sum;
    }

    // ----------------------------
    // Filters & sort
    // ----------------------------
    function getFilteredProducts(){
      const q = (document.getElementById("searchInput").value || "").trim().toLowerCase();
      const cat = document.getElementById("catFilter").value;
      const sort = document.getElementById("sortSelect").value;

      let list = [...products];

      if(cat !== "all"){
        list = list.filter(p => p.cat === cat);
      }

      if(q){
        list = list.filter(p => {
          const item = p[currentLang];
          const text = `${item?.n||""} ${item?.d||""}`.toLowerCase();
          return text.includes(q);
        });
      }

      if(sort === "price_asc") list.sort((a,b)=>a.p-b.p);
      else if(sort === "price_desc") list.sort((a,b)=>b.p-a.p);
      else if(sort === "name_asc") list.sort((a,b)=>{
        const an=(a[currentLang]?.n||"").toLowerCase();
        const bn=(b[currentLang]?.n||"").toLowerCase();
        return an.localeCompare(bn);
      });
      else if(sort === "name_desc") list.sort((a,b)=>{
        const an=(a[currentLang]?.n||"").toLowerCase();
        const bn=(b[currentLang]?.n||"").toLowerCase();
        return bn.localeCompare(an);
      });

      return list;
    }

    // (DÜZENLENDİ) renderCard içine skeleton + alt + fallback attribute eklendi
    function renderCard(p){
      const item = p[currentLang];

      const desc = item?.d ?? "";
      const altText = p.alt?.[currentLang] || name;

      return `
        <article class="card">
          <div class="img-skeleton" aria-hidden="true"></div>
          <img
            src="${p.i}"
            class="card-img"
            loading="lazy"
            alt="${altText}"
            data-fallback="${FALLBACK_IMG}"
          >
          <div class="card-content">
            <h3>${name}</h3>
            <p>${desc}</p>
            <div class="card-footer">
              <span class="price">${formatMoney(p.p)}</span>
              <button class="btn-add" type="button" data-add="${p.id}">${translations[currentLang].add}</button>
            </div>
          </div>
        </article>
      `;
    }

    function renderCartModalBody(){
      const t = translations[currentLang];
      const container = document.getElementById("cartBody");
      const ids = Object.keys(cart).filter(id => (Number(cart[id])||0) > 0);

      if(ids.length === 0){
        container.innerHTML = `<div class="empty">${t.empty}</div>`;
        updateCartUI();
        return;
      }

      let html = `<div class="cart-list">`;
      for(const id of ids){
        const p = productById[id];
        if(!p) continue;
        const qty = Number(cart[id]) || 0;
        const item = p[currentLang];
        const name = item?.n ?? "";
        const desc = item?.d ?? "";
        const lineEUR = p.p * qty;

        html += `
          <div class="cart-item" data-id="${id}">
            <img src="${p.i}" alt="${p.alt?.[currentLang] || name}" loading="lazy">
            <div>
              <div class="ci-title">${name}</div>
              <div class="ci-desc">${desc}</div>
              <div class="ci-desc" style="margin-top:6px; color:#aaa; font-weight:900;">
                ${formatMoney(p.p)} × ${qty} = ${formatMoney(lineEUR)}

      }
      html += `</div>`;
      container.innerHTML = html;

    // ----------------------------
    // Cart actions
    // ----------------------------
    function addToCart(id){
      if(!productById[id]) return;
      cart[id] = clampQty((Number(cart[id])||0) + 1);
      saveCart();
      updateCartUI();
      renderCartModalBody();
    }

    function setQty(id, qty){
      if(!productById[id]) return;
      const q = clampQty(qty);
      if(q <= 0) delete cart[id];
      else cart[id] = q;
      saveCart();
      updateCartUI();
      renderCartModalBody();
    }

    function clearCart(){
      cart = {};
      saveCart();
      updateCartUI();
      renderCartModalBody();
    }

    // ----------------------------
    // WhatsApp order
    // ----------------------------
    function buildWhatsAppMessage(){
      const t = translations[currentLang];
      const ids = Object.keys(cart).filter(id => (Number(cart[id])||0) > 0);

      let lines = [];
      lines.push("CAFE 17 - ORDER");
      lines.push("--------------------");

      for(const id of ids){
        const p = productById[id];
        if(!p) continue;
        const qty = Number(cart[id])||0;
        const item = p[currentLang];
        const name = item?.n ?? id;
        const lineEUR = p.p * qty;

        lines.push(`${qty}x ${name} — ${formatMoney(lineEUR)}`);
      }

      lines.push("--------------------");
      lines.push(`${t.total}: ${formatMoney(cartTotalEUR())}`);

      if(currency === "TRY"){
        lines.push(`(Rate: 1€ = ${Number(tryRate||0).toFixed(2)}₺)`);
      }

      const note = (document.getElementById("orderNote").value || "").trim();
      if(note){
        lines.push("");
        lines.push("NOTE:");
        lines.push(note);
      }

      return lines.join("\n");
    }

    function sendToWhatsApp(){
      const t = translations[currentLang];
      if(cartCount() === 0){
        alert(t.empty);
        return;
      }

      const raw = document.getElementById("waNumber").value.trim();
      const number = raw.replace(/[^\d]/g, "");
      if(!number || number.length < 10){
        alert("WhatsApp numarası geçersiz görünüyor. Ülke kodu ile yaz: 90xxxxxxxxxx");
        return;
      }

      const msg = buildWhatsAppMessage();
      const url = `https://wa.me/${number}?text=${encodeURIComponent(msg)}`;
      window.open(url, "_blank", "noopener");
    }

    const cartModal = document.getElementById("cartModal");
    const cartBackdrop = document.getElementById("cartBackdrop");

    // (EKLENDİ) focus restore
    let lastFocusEl = null;

    function openCart(){
      lastFocusEl = document.activeElement;
      cartModal.classList.add("open");
      cartBackdrop.classList.add("open");
      cartModal.focus();
      // (EKLENDİ) try to focus first meaningful control
      const first = cartModal.querySelector('button, [href], input, textarea, select, [tabindex]:not([tabindex="-1"])');
      if(first) first.focus();
    }
    function closeCart(){
      cartModal.classList.remove("open");
      cartBackdrop.classList.remove("open");
      // (EKLENDİ) restore focus to where it came from (prefer cartFloat)
      const cartFloat = document.getElementById("cartFloat");
      if(cartFloat) cartFloat.focus();
      else if(lastFocusEl && typeof lastFocusEl.focus === "function") lastFocusEl.focus();
    }

    // =========================================================
    // (EKLENDİ) Modal focus trap (Tab içinde kalsın)
    // =========================================================
    function trapFocusInModal(e){
      if(!cartModal.classList.contains("open")) return;
      if(e.key !== "Tab") return;

      const focusables = cartModal.querySelectorAll(
        'button, [href], input, textarea, select, [tabindex]:not([tabindex="-1"])'
      );
      if(!focusables.length) return;

      const first = focusables[0];
      const last = focusables[focusables.length - 1];

      if(e.shiftKey){
        if(document.activeElement === first){
          e.preventDefault();
          last.focus();
        }
      } else {
        if(document.activeElement === last){
          e.preventDefault();
          first.focus();
        }
      }
    }

    // =========================================================
    // (EKLENDİ) Premium image init: blur-up + fallback + skeleton remove
    // =========================================================
    function initPremiumImages(){
      const imgs = document.querySelectorAll("img.card-img:not([data-premium-ready])");
      imgs.forEach(img => {
        img.setAttribute("data-premium-ready", "1");

        const skeleton = img.parentElement?.querySelector(".img-skeleton");

        const markLoaded = () => {
          img.classList.add("loaded");
          if(skeleton) skeleton.style.display = "none";
        };

        // already cached
        if(img.complete && img.naturalWidth > 0){
          markLoaded();
        } else {
          img.addEventListener("load", markLoaded, { once:true });
        }

        img.addEventListener("error", () => {
          const fb = img.getAttribute("data-fallback") || FALLBACK_IMG;
          // sonsuz döngüyü engelle
          if(img.src !== fb){
            img.src = fb;
          } else {
            // fallback da bozulursa skeleton kapat
            if(skeleton) skeleton.style.display = "none";
          }
        }, { once:false });
      });
    }

    // ----------------------------
    // Events
    // ----------------------------
    document.addEventListener("click", (e) => {
      const addBtn = e.target.closest("[data-add]");
      if(addBtn){
        addToCart(addBtn.getAttribute("data-add"));
        return;
      }

      const qtyBtn = e.target.closest("[data-qty]");
      if(qtyBtn){
        const itemEl = e.target.closest(".cart-item");
        if(!itemEl) return;
        const id = itemEl.getAttribute("data-id");
        const action = qtyBtn.getAttribute("data-qty");
        const current = Number(cart[id]) || 0;
        setQty(id, action === "inc" ? current + 1 : current - 1);
        return;
      }

      const rmBtn = e.target.closest("[data-remove]");
      if(rmBtn){
        const itemEl = e.target.closest(".cart-item");
        if(!itemEl) return;
        const id = itemEl.getAttribute("data-id");
        setQty(id, 0);
        return;
      }
    });

    // Search/filter/sort re-render
    // (DÜZENLENDİ) double render engellendi: searchInput -> input, select'ler -> change
    document.getElementById("searchInput").addEventListener("input", () => renderMenu());
    document.getElementById("catFilter").addEventListener("change", () => renderMenu());
    document.getElementById("sortSelect").addEventListener("change", () => renderMenu());

    // Language toggle
    document.getElementById("langBtn").addEventListener("click", () => {
      currentLang = (currentLang === "tr") ? "en" : "tr";
      renderMenu();
    });

    // Currency toggle
    document.getElementById("currencyBtn").addEventListener("click", () => {
      currency = (currency === "EUR") ? "TRY" : "EUR";
      updateCurrencyBtn();
      renderMenu();
    });

    // Rate input
    document.getElementById("tryRate").addEventListener("input", (e) => {
      const v = Number(String(e.target.value).replace(",", "."));
      if(Number.isFinite(v) && v > 0) tryRate = v;
      saveSettings();
      updateCartUI();
      renderCartModalBody();
      renderMenu();
    });

    // WhatsApp number persist
    document.getElementById("waNumber").addEventListener("input", saveSettings);

    // (EKLENDİ) Order note persist
    document.getElementById("orderNote").addEventListener("input", saveOrderNote);

    // Drawer controls
    menuBtn.addEventListener("click", () => {
      if(drawer.classList.contains("open")) closeDrawer();
      else openDrawer();
    });
    drawerClose.addEventListener("click", closeDrawer);
    drawerBackdrop.addEventListener("click", closeDrawer);
    document.getElementById("drawerLinks").addEventListener("click", (e) => {
      if(e.target.tagName === "A") closeDrawer();
    });

    // Cart modal controls
    document.getElementById("cartFloat").addEventListener("click", openCart);
    document.getElementById("cartClose").addEventListener("click", closeCart);
    cartBackdrop.addEventListener("click", closeCart);

    document.getElementById("clearCartBtn").addEventListener("click", clearCart);
    document.getElementById("waSendBtn").addEventListener("click", sendToWhatsApp);

    document.getElementById("checkoutBtn").addEventListener("click", () => {
      const t = translations[currentLang];
      if(cartCount() === 0){
        alert(t.empty);
        return;
      }
      alert(`${t.total}: ${formatMoney(cartTotalEUR())}\n\n(Demo — ödeme için backend gerekir.)`);
    });

    // Feedback submit (demo)
    document.addEventListener("submit", (e) => {
      if(e.target && e.target.id === "feedbackForm"){
        e.preventDefault();
        alert("Success!");
        e.target.reset();
      }
    });

    // ESC to close drawer/cart + (EKLENDİ) focus trap Tab
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape"){
        closeDrawer();
        closeCart();
      }
      trapFocusInModal(e);
    });

    // Init
    renderMenu();
    setRandomHero(); // (EKLENDİ)
  </script>
</body>
</html>
